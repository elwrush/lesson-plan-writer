        <style>
            /* =============================================
               LESSON PLAN WRITER 3 — BASE SLIDE STYLES
               Authoritative stylesheet for all presentations.
               ============================================= */

            /* --- CEFR Badges --- */
            .cefr-badge {
                display: inline-block;
                color: white;
                font-weight: bold;
                padding: 4px 12px;
                border-radius: 4px;
                font-size: 0.4em;
                vertical-align: middle;
                margin-left: 10px;
            }
            .cefr-badge.A1 { background: #4caf50; }
            .cefr-badge.A2 { background: #8bc34a; }
            .cefr-badge.B1 { background: #2196f3; }
            .cefr-badge.B2 { background: #2a76dd; }
            .cefr-badge.C1 { background: #9c27b0; }
            .cefr-badge.C2 { background: #f44336; }

            /* --- Title logo --- */
            .reveal .title-logo {
                display: block;
                max-height: 100px;
                margin: 0 auto 1em;
            }

            /* --- Labels & captions --- */
            .reveal .aim-label {
                font-size: 0.7em;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }
            .reveal .material-ref {
                font-size: 0.65em;
                color: #888;
                font-style: italic;
                margin-top: 0.5em;
            }
            .reveal .source-cite {
                font-size: 0.7em;
                color: #666;
                font-style: italic;
                margin-top: 0.3em;
            }
            .reveal .image-caption {
                font-size: 0.55em;
                color: #888;
                text-align: center;
                margin-top: 0.2em;
            }

            /* --- Vocabulary slides --- */
            .reveal section.vocab-slide h2 { font-size: 2.2em; }
            .reveal section.vocab-slide p  { font-size: 1.3em; line-height: 1.4; }
            .reveal .vocab-word {
                color: #ffdd00;
                font-weight: bold;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            }

            /* --- Slide type icons (Font Awesome, teal/red/orange) --- */
            .reveal .slide-icon {
                font-size: 2.5em;
                margin-bottom: 0.3em;
                display: block;
                text-align: center;
            }
            .reveal .slide-icon.transition-icon { color: rgba(255,255,255,0.85); }
            .reveal .slide-icon.pedagogical-icon { color: rgba(255,255,255,0.9); }
            .reveal .slide-icon.objective-icon { color: rgba(255,221,0,0.85); }

            /* --- Pedagogical strategy slides (teal background) --- */
            .reveal section.pedagogical h2 {
                color: #fff;
                border-bottom: 3px solid rgba(255,255,255,0.3);
                padding-bottom: 0.3em;
            }
            .reveal section.pedagogical h3 { color: #fff; }
            .reveal section.pedagogical p  { color: #fff; }
            .reveal section.pedagogical li { color: #fff; }
            .reveal section.pedagogical .strategy-tip {
                font-size: 0.85em;
                font-style: italic;
                color: rgba(255,255,255,0.85);
                margin-bottom: 0.5em;
            }
            .reveal section.pedagogical .evidence {
                font-size: 0.8em;
                background: rgba(0,0,0,0.3);
                padding: 0.4em 0.6em;
                border-radius: 4px;
                border-left: 3px solid rgba(255,255,255,0.4);
            }

            /* --- Global text shadow for readability --- */
            .reveal p,
            .reveal li,
            .reveal h1, .reveal h2, .reveal h3,
            .reveal h4, .reveal h5, .reveal h6 {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            }

            /* --- Fragment styles --- */
            .reveal .fragment.highlight-green {
                background: rgba(0, 100, 0, 0.4);
                padding: 0.3em 0.5em;
                border-radius: 4px;
            }
            .reveal .fragment.highlight-red {
                background: rgba(100, 0, 0, 0.4);
                padding: 0.3em 0.5em;
                border-radius: 4px;
            }
            .reveal .fragment.answer-correct.visible {
                background: rgba(0, 120, 0, 0.5);
                padding: 0.3em 0.5em;
                border-radius: 4px;
            }
            .reveal .fragment.answer-incorrect.visible {
                background: rgba(120, 0, 0, 0.5);
                padding: 0.3em 0.5em;
                border-radius: 4px;
            }
            .reveal table.answer-table th {
                background: rgba(0, 0, 0, 0.2);
                font-weight: bold;
            }
            .reveal .fragment.strike {
                text-decoration: line-through;
                opacity: 0.6;
            }
        </style>
    </head>

        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/zoom/zoom.js"></script>

        <script>
            Reveal.initialize({
                history: true,
                slideNumber: "c/t",
                transition: "slide",
                width: 1280,
                height: 720,
                autoAnimateUnmatched: true,
                audio: {
                    prefix: 'assets/',
                    suffix: '.mp3',
                    advance: -1,
                    autoplay: false,
                    defaultAudios: false,
                    defaultDuration: 0,
                    playerOpacity: 1.0,
                    playerStyle: 'position: fixed; bottom: 30px; left: 25%; width: 50%; height:75px; z-index: 33;',
                    startAtFragment: false,
                },
                plugins: [
                    TimerPlugin,
                    RevealHighlight,
                    RevealMath.KaTeX,
                    RevealNotes,
                    RevealSearch,
                    RevealZoom,
                    RevealAudioSlideshow,
                ],
            });
