<!DOCTYPE html>
<!--
    DEPRECATED — Markdown-based template. No longer used.
    All new presentations must start from: templates/base-slides-template.html
    This file is kept for backward compatibility with existing markdown-based slide sets.
    Last used: May 2026 (prior to auto-animate requirement).
-->
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css" />
        <style>
            /* =============================================
               ESSENTIAL UTILITIES ONLY
               Native reveal.js handles all text styling
               ============================================= */
            
            /* CEFR Badges */
            .cefr-badge {
                display: inline-block;
                color: white;
                font-weight: bold;
                padding: 4px 12px;
                border-radius: 4px;
                font-size: 0.4em;
                vertical-align: middle;
                margin-left: 10px;
            }
            .cefr-badge.A1 { background: #4caf50; }
            .cefr-badge.A2 { background: #8bc34a; }
            .cefr-badge.B1 { background: #2196f3; }
            .cefr-badge.B2 { background: #2a76dd; }
            .cefr-badge.C1 { background: #9c27b0; }
            .cefr-badge.C2 { background: #f44336; }

            /* Title logo */
            .reveal .title-logo {
                display: block;
                max-height: 100px;
                margin: 0 auto 1em;
            }

            /* Labels and captions */
            .reveal .aim-label {
                font-size: 0.7em;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }
            .reveal .material-ref {
                font-size: 0.65em;
                color: #888;
                font-style: italic;
                margin-top: 0.5em;
            }
            .reveal .source-cite {
                font-size: 0.7em;
                color: #666;
                font-style: italic;
                margin-top: 0.3em;
            }
            .reveal .image-caption {
                font-size: 0.55em;
                color: #888;
                text-align: center;
                margin-top: 0.2em;
            }

            /* Vocabulary slides - larger text */
            .reveal section.vocab-slide h2 {
                font-size: 2.2em;
            }
            .reveal section.vocab-slide p {
                font-size: 1.3em;
                line-height: 1.4;
            }

            /* Vocabulary word emphasis - yellow bold */
            .reveal .vocab-word {
                color: #ffdd00;
                font-weight: bold;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            }

            /* Pedagogical slides - teal background */
            .reveal section.pedagogical {
                background: #1a6b5a;
            }
            .reveal section.pedagogical h2 {
                color: #fff;
                border-bottom: 3px solid rgba(255,255,255,0.3);
                padding-bottom: 0.3em;
            }
            .reveal section.pedagogical h3 {
                color: #fff;
            }
            .reveal section.pedagogical p {
                color: #fff;
            }
            .reveal section.pedagogical li {
                color: #fff;
            }
            .reveal section.pedagogical .strategy-tip {
                font-size: 0.85em;
                font-style: italic;
                color: rgba(255,255,255,0.85);
                margin-bottom: 0.5em;
            }
            .reveal section.pedagogical .evidence {
                font-size: 0.8em;
                background: rgba(0,0,0,0.3);
                padding: 0.4em 0.6em;
                border-radius: 4px;
                border-left: 3px solid rgba(255,255,255,0.4);
            }

            /* Text shadow for readability - native reveal.js feature */
            .reveal p,
            .reveal li,
            .reveal h1, .reveal h2, .reveal h3,
            .reveal h4, .reveal h5, .reveal h6 {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            }
        </style>
        <link rel="stylesheet" href="timer-plugin.css" />
    </head>
    <body>
        <div class="reveal">
            <div class="slides">
                <section data-markdown data-separator-notes="^[Nn]otes?:">
                    <textarea data-template>
{{ MARKDOWN }}
                    </textarea>
                </section>
            </div>
        </div>
        <script src="timer-plugin.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/search/search.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/zoom/zoom.js"></script>
        <script>
            Reveal.initialize({
                history: true,
                slideNumber: "c/t",
                transition: "slide",
                width: 1280,
                height: 720,
                plugins: [
                    RevealMarkdown,
                    RevealHighlight,
                    RevealMath.KaTeX,
                    RevealNotes,
                    RevealSearch,
                    RevealZoom,
                    TimerPlugin,
                ],
            });
        </script>
    </body>
</html>
