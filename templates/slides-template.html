<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css" />
        <style>
            .reveal .slides section[data-markdown] {
                text-align: left;
                padding: 0 60px;
            }
            .reveal h2 {
                font-size: 1.6em;
                margin-bottom: 0.4em;
                border-bottom: 2px solid #2a76dd;
                padding-bottom: 0.2em;
            }
            .reveal h3 {
                font-size: 1.2em;
                color: #555;
                margin-bottom: 0.3em;
            }
            .reveal ul {
                display: block;
                list-style-type: disc;
            }
            .reveal li {
                margin-bottom: 0.3em;
            }
            .reveal .aim-label {
                font-size: 0.7em;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }
            .reveal .stage-header {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 0.4em;
            }
            .reveal .stage-meta {
                font-size: 0.6em;
                color: #888;
            }
            .cefr-badge {
                display: inline-block;
                color: white;
                font-weight: bold;
                padding: 4px 12px;
                border-radius: 4px;
                font-size: 0.4em;
                vertical-align: middle;
                margin-left: 10px;
            }
            .cefr-badge.A1 { background: #4caf50; }
            .cefr-badge.A2 { background: #8bc34a; }
            .cefr-badge.B1 { background: #2196f3; }
            .cefr-badge.B2 { background: #2a76dd; }
            .cefr-badge.C1 { background: #9c27b0; }
            .cefr-badge.C2 { background: #f44336; }
            .reveal .material-ref {
                font-size: 0.65em;
                color: #888;
                font-style: italic;
                margin-top: 0.5em;
            }
            .reveal .answer-block {
                background: #e8f5e9;
                border-left: 4px solid #4caf50;
                padding: 10px 16px;
                margin: 0.5em 0;
            }
            .reveal .answer-block .correct {
                font-weight: bold;
                color: #2e7d32;
            }
            .reveal .answer-block .explanation {
                font-size: 0.85em;
                margin-top: 0.3em;
            }
            .reveal .source-cite {
                font-size: 0.7em;
                color: #666;
                font-style: italic;
                margin-top: 0.3em;
            }
            .reveal .summary-box {
                background: #e3f2fd;
                border-left: 4px solid #2a76dd;
                padding: 16px 20px;
                margin: 0.5em 0;
            }
            .reveal .slides section:first-of-type {
                text-align: center;
            }
            .reveal .slides section:first-of-type h1 {
                font-size: 2em;
                margin-bottom: 0.3em;
                color: #ffffff;
                display: inline-block;
                background: #800020;
                padding: 0.1em 0.5em;
                border-radius: 4px;
            }
            .reveal .slides section:first-of-type p {
                display: inline-block;
                background: #800020;
                padding: 0.05em 0.5em;
                border-radius: 3px;
                color: #ffffff;
            }
            .reveal .slides section:first-of-type .cefr-badge {
                vertical-align: middle;
            }
            .reveal .title-slide .subtitle {
                font-size: 0.8em;
                color: #cccccc;
            }
            .reveal .title-slide .teacher-name {
                font-size: 0.7em;
                color: #aaaaaa;
                margin-top: 1em;
            }
            .reveal .title-logo {
                display: block;
                max-height: 100px;
                margin: 0 auto 1em;
                opacity: 1;
            }
            .reveal .image-caption {
                font-size: 0.55em;
                color: #888;
                text-align: center;
                margin-top: 0.2em;
            }
            .reveal img {
                max-height: 400px;
                margin: 0 auto;
            }
        </style>
    </head>
    <body>
        <div class="reveal">
            <div class="slides">
                <section data-markdown data-separator-notes="^[Nn]otes?:">
                    <textarea data-template>
{{ MARKDOWN }}
                    </textarea>
                </section>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/math/math.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/search/search.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/zoom/zoom.js"></script>
        <script>
            Reveal.initialize({
                history: true,
                slideNumber: "c/t",
                transition: "slide",
                width: 1280,
                height: 720,
                plugins: [
                    RevealMarkdown,
                    RevealHighlight,
                    RevealMath.KaTeX,
                    RevealNotes,
                    RevealSearch,
                    RevealZoom,
                ],
            });
        </script>
    </body>
</html>
